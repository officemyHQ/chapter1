<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal — myHQ T&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
:root {
  --blue:      #1E22AA;
  --blue-mid:  #4A4FD4;
  --blue-soft: #7B7FE8;
  --blue-pale: #C7C9F5;
  --blue-wash: #f4f5fb;
  --white:     #FFFFFF;
  --border:    rgba(30,34,170,0.1);
  --sans:      'Manrope', system-ui, sans-serif;
  --mono:      'JetBrains Mono', ui-monospace, monospace;
  --ease:      cubic-bezier(0.22,1,0.36,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); background: var(--blue-wash); color: var(--blue); min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  height: 56px; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--white); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.topbar-rule { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--blue); }
.brand-mark { height: 34px; }
.topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--blue); }
.back-btn {
  font-size: 12px; font-weight: 600; color: var(--blue-soft); text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--blue); }

/* ── Content ── */
.content { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
.tab-btn {
  padding: 10px 22px; font-family: var(--sans); font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; border: none; background: none; cursor: pointer;
  color: var(--blue-soft); border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Cards ── */
.card { background: var(--white); border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-soft); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.card-title::before { content: ''; width: 14px; height: 1px; background: var(--blue-soft); }

/* ── Search ── */
.search-row { display: flex; gap: 10px; }
.search-input {
  flex: 1; font-family: var(--sans); font-size: 13px; font-weight: 600;
  color: var(--blue); padding: 11px 14px;
  background: var(--blue-wash); border: 1px solid var(--border);
  outline: none; transition: border-color 0.18s;
}
.search-input:focus { border-color: var(--blue); background: var(--white); }
.search-input::placeholder { color: var(--blue-pale); font-weight: 500; }
.search-btn {
  padding: 11px 20px; font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--blue); color: var(--white); border: none; cursor: pointer;
  transition: background 0.15s;
}
.search-btn:hover { background: var(--blue-mid); }

/* ── User result card ── */
.user-result { display: none; margin-top: 16px; }
.user-result.visible { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--blue-wash); border: 1px solid var(--border); }
.user-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 700; color: var(--blue); }
.user-email { font-size: 11px; color: var(--blue-soft); margin-top: 2px; font-family: var(--mono); }
.user-lastlogin { font-size: 10px; color: var(--blue-pale); margin-top: 3px; font-family: var(--mono); }
.user-admin-area { display: flex; align-items: center; gap: 10px; }
.admin-label { font-size: 11px; font-weight: 600; color: var(--blue-soft); }
.master-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 10px; background: #e6f9e9; color: #2e7d32; border: 1px solid #BEE5C2;
}

/* Toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; cursor: pointer;
  background: #e0e0e0; border-radius: 22px; transition: 0.3s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%;
  left: 3px; bottom: 3px; background: white; transition: 0.3s;
}
.toggle input:checked + .toggle-slider { background: var(--blue); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── Course pills ── */
.course-pills { display: flex; gap: 8px; margin-bottom: 20px; }
.course-pill {
  padding: 8px 18px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--white);
  color: var(--blue-soft); transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.course-pill.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

/* ── Chapter rows ── */
.chapter-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.chapter-row:last-child { border-bottom: none; }
.chapter-row.dimmed { opacity: 0.45; }
.chapter-name { font-size: 13px; font-weight: 700; color: var(--blue); }
.chapter-desc { font-size: 11px; color: var(--blue-soft); margin-top: 3px; font-family: var(--mono); }
.unlock-pill {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 14px; cursor: pointer; border: none; transition: opacity 0.3s, background 0.15s;
}
.unlock-pill.unlocked { background: #BEE5C2; color: #2e7d32; }
.unlock-pill.locked   { background: #f0f0f0; color: #8B8FA8; }
.unlock-pill.na       { background: #f0f0f0; color: #8B8FA8; cursor: default; }
.unlock-pill.fade     { opacity: 0.4; }

.chapters-note {
  font-size: 10px; color: var(--blue-soft); margin-top: 14px;
  font-family: var(--mono); letter-spacing: 0.04em;
}

/* ── All users table ── */
.users-table { width: 100%; border-collapse: collapse; }
.users-table th {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue-soft); padding: 10px 12px; text-align: left;
  border-bottom: 2px solid var(--border);
}
.users-table td {
  padding: 12px 12px; font-size: 12px; font-weight: 600; color: var(--blue);
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.users-table tr:hover td { background: var(--blue-wash); }
.badge-admin {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; background: var(--blue-wash); color: var(--blue-mid);
  border: 1px solid var(--blue-pale);
}
.badge-master {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; background: #e6f9e9; color: #2e7d32;
  border: 1px solid #BEE5C2;
}

/* ── Edit chapter tab ── */
.chapter-select {
  font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--blue);
  padding: 10px 14px; background: var(--white); border: 1px solid var(--border);
  outline: none; cursor: pointer; width: 100%; max-width: 320px; margin-bottom: 24px;
  appearance: none; -webkit-appearance: none;
}
.edit-subtab { padding:8px 18px; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:none; border:none; border-bottom:2px solid transparent; color:var(--blue-soft); cursor:pointer; margin-bottom:-1px; }
.edit-subtab.active { color:var(--blue); border-bottom-color:var(--blue); }
.edit-field { margin-bottom: 18px; }
.edit-label {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue-soft); margin-bottom: 6px; display: block;
}
.edit-input {
  width: 100%; font-family: var(--sans); font-size: 13px; font-weight: 600;
  color: var(--blue); padding: 11px 14px; background: var(--blue-wash);
  border: 1px solid var(--border); outline: none; transition: border-color 0.18s;
}
.edit-input:focus { border-color: var(--blue); background: var(--white); }
.draft-indicator {
  font-size: 10px; color: #2e7d32; font-family: var(--mono); letter-spacing: 0.06em;
  margin-bottom: 16px; min-height: 16px; transition: opacity 0.3s;
}
.sync-btn {
  padding: 12px 24px; font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--blue); color: var(--white); border: none; cursor: pointer;
  transition: background 0.15s; margin-top: 8px;
}
.sync-btn:hover { background: var(--blue-mid); }
.sync-msg {
  font-size: 11px; color: var(--blue-mid); font-family: var(--mono);
  margin-top: 10px; min-height: 18px; letter-spacing: 0.04em;
}
.diff-row {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 120px 1fr 1fr auto; gap: 12px; align-items: start;
  transition: opacity 0.2s;
}
.diff-row:last-child { border-bottom: none; }
.diff-row.state-accepted { background: #f4fbf5; }
.diff-row.state-rejected { opacity: 0.45; }
.diff-field-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue-soft); padding-top: 6px; }
.diff-old { font-size: 12px; color: #c62828; background: #fff5f5; padding: 8px 10px; border-left: 3px solid #f44336; line-height: 1.5; }
.diff-new { font-size: 12px; color: #2e7d32; background: #f1f8f1; padding: 0; border-left: 3px solid #4caf50; line-height: 1.5; position: relative; }
.diff-new-text { padding: 8px 10px; display: block; }
.diff-new-input { display: none; width: 100%; font-family: var(--sans); font-size: 12px; color: #1b5e20; background: #f1f8f1; border: none; border-top: 1px dashed #4caf50; padding: 6px 10px; resize: vertical; min-height: 36px; outline: none; }
.diff-new-edit-btn { position: absolute; top: 4px; right: 6px; font-size: 8px; font-family: var(--mono); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #2e7d32; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
.diff-same { font-size: 12px; color: var(--blue-soft); padding: 6px 10px; font-style: italic; grid-column: 2 / 4; }
.diff-actions { display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }
.diff-accept { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; background: #e6f9e9; color: #2e7d32; border: 1px solid #BEE5C2; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.diff-accept.active { background: #2e7d32; color: #fff; border-color: #2e7d32; }
.diff-reject { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; background: #fff5f5; color: #c62828; border: 1px solid #ffcdd2; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.diff-reject.active { background: #c62828; color: #fff; border-color: #c62828; }
.diff-push-btn { padding: 13px 28px; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
.diff-push-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.chapter-pill {
  padding: 8px 16px; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--blue-soft); cursor: pointer; transition: all 0.15s;
}
.chapter-pill.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.chapter-pill:disabled { opacity: 0.4; cursor: default; }
.pill-wrap { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.chapter-pill.has-pending { border-color: #f59e0b; color: #92400e; background: #fffbeb; }
.chapter-pill.has-pending.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.course-pill.has-pending { border-color: #f59e0b; color: #92400e; }
.course-pill.has-pending.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.pill-callout {
  font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 2px;
}
.pill-callout.status-pending { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-rule"></div>
  <img src="logo_landing_hub/myHQ_logo_landing.png" alt="myHQ" class="brand-mark">
  <span class="topbar-title">Admin Portal</span>
  <a href="hub.html" class="back-btn">← Back to Hub</a>
</div>

<div class="content">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('access')">Logins &amp; Access</button>
    <button class="tab-btn" onclick="switchTab('edit')">Edit Chapter</button>
  </div>

  <!-- TAB 1: LOGINS & ACCESS -->
  <div class="tab-panel active" id="tab-access">

    <!-- User search -->
    <div class="card">
      <div class="card-title">Find User</div>
      <div class="search-row">
        <input class="search-input" id="search-input" type="email" placeholder="user@myhq.in" />
        <button class="search-btn" onclick="searchUser()">Search</button>
      </div>
      <div class="user-result" id="user-result">
        <div class="user-avatar" id="result-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="result-name"></div>
          <div class="user-email" id="result-email"></div>
          <div class="user-lastlogin" id="result-lastlogin"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
          <div class="user-admin-area" id="result-admin-area"></div>
          <button onclick="clearSearch()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-soft);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;padding:0;text-decoration:underline;">✕ Clear</button>
        </div>
      </div>
    </div>

    <!-- Course pill selector -->
    <div class="card" id="unlock-card" style="display:none;">
      <div class="card-title">Select Course</div>
      <div class="course-pills">
        <button class="course-pill active" onclick="selectCourse('beginner',this)">01 Beginner</button>
        <button class="course-pill" onclick="selectCourse('intermediate',this)">02 Intermediate</button>
        <button class="course-pill" onclick="selectCourse('advanced',this)">03 Advanced</button>
      </div>
      <div id="chapter-list"></div>
      <div class="chapters-note">⚡ Click Unlocked / Locked to toggle. Updates in real-time — no Save button.</div>
    </div>

    <!-- All users list -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>All Users</span>
        <span id="users-count" style="font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-pale);letter-spacing:0.08em;"></span>
      </div>
      <table class="users-table">
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Last Login</th><th>Role</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
      <!-- Collapsed footer -->
      <div id="users-footer" style="display:none;padding:12px 0 0;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);margin-top:8px;">
        <button id="show-all-btn" onclick="toggleShowAll()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;padding:0;text-decoration:underline;"></button>
        <div id="pagination-controls" style="display:none;align-items:center;gap:8px;">
          <button onclick="changePage(-1)" style="background:none;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;padding:4px 10px;letter-spacing:0.06em;">← Prev</button>
          <span id="page-indicator" style="font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-soft);letter-spacing:0.06em;"></span>
          <button onclick="changePage(1)" style="background:none;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;padding:4px 10px;letter-spacing:0.06em;">Next →</button>
        </div>
      </div>
    </div>

  </div>

  <!-- TAB 2: EDIT CHAPTER -->
  <div class="tab-panel" id="tab-edit">

    <!-- Step 1: Course picker -->
    <div class="card">
      <div class="card-title">Select Course</div>
      <div class="course-pills" id="edit-course-pills"></div>
    </div>

    <!-- Step 2: Chapter picker -->
    <div class="card" id="edit-chapter-card">
      <div class="card-title">Select Chapter</div>
      <div id="edit-chapter-pills" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>

    <!-- Step 3a: Editor view -->
    <div class="card" id="edit-editor-card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;" id="edit-chapter-label"></div>
        <div class="draft-indicator" id="draft-indicator"></div>
      </div>
      <div id="edit-subtabs" style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);">
        <button class="edit-subtab active" id="subtab-slide" onclick="switchEditTab('slide')">Slide Content</button>
        <button class="edit-subtab" id="subtab-content" onclick="switchEditTab('content')">Chapter Content</button>
        <button class="edit-subtab" id="subtab-assess" onclick="switchEditTab('assess')">Assessment</button>
      </div>
      <div id="edit-fields"></div>
      <div id="sync-area" style="margin-top:16px;"></div>
    </div>

    <!-- Step 3b: Diff / review view (masterAdmin only) -->
    <div class="card" id="diff-card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="card-title" style="margin-bottom:0;">Review Changes — <span id="diff-chapter-label" style="color:var(--blue-mid);"></span></div>
        <button onclick="showEditorView()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;">← Back to Edit</button>
      </div>
      <div id="diff-rows"></div>
      <div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap;">
        <button onclick="acceptAllFields()" style="padding:10px 20px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#e6f9e9;color:#2e7d32;border:1px solid #BEE5C2;cursor:pointer;">✓ Accept All</button>
        <button onclick="rejectAllFields()" style="padding:10px 20px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#fff5f5;color:#c62828;border:1px solid #ffcdd2;cursor:pointer;">✕ Reject All</button>
        <div style="flex:1;"></div>
        <button class="diff-push-btn" id="push-live-btn" onclick="pushLive()" disabled>Push to Live →</button>
      </div>
      <div class="sync-msg" id="sync-msg"></div>
    </div>

  </div>

</div>

<script>
const db   = window.firebaseDB;
const auth = window.firebaseAuth;

let currentUser    = null;
let currentUserDoc = null;
let selectedCourse = 'beginner';
let isMasterAdmin  = false;

const CHAPTER_DEFS = {
  ch1: {
    label: 'Where We Play',
    course: 'beginner',
    slideFields: [
      { id: 'slide-1-headline',  label: 'Chapter Title (Topbar)', type: 'input', group: 'Cover', default: 'Where We Play' },
      { id: 'slide-1-sub',       label: 'Tagline',                type: 'input', group: 'Cover', default: "Where We Play: India's $1 trillion real estate market." },
      { id: 'ch1-sl1-sub',       label: 'Sub-heading',            type: 'input', group: 'Slide 1 — $1T Stat', default: 'Understanding the arena before learning how to win in it.' },
      { id: 'ch1-sl1-fact1',     label: 'Fact 1',                 type: 'input', group: 'Slide 1 — $1T Stat', default: "World's 3rd largest real estate market by value" },

    contentFields: [
      { id: 'ch1-s01-title',    label: 'Title',           type: 'input',    group: 'S01 — Indian Real Estate: The Big Picture', default: 'Indian Real Estate: The Big Picture' },
      { id: 'ch1-s01-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S01 — Indian Real Estate: The Big Picture', default: "The scale of India's real estate market — its size, its growth drivers, and why office space sits at its centre." },
      { id: 'ch1-s01-body',     label: 'Body',            type: 'textarea', group: 'S01 — Indian Real Estate: The Big Picture', default: "India's real estate sector is the third largest in the world by value, after only the US and China. Every developer, operator, advisor, and platform here is playing in a global arena. The sector contributes 7% of India's GDP today, roughly $210 billion, with that share projected to reach 13% by 2030.\n\nIt is also one of India's biggest employers. Real estate and construction together support over 70 million jobs, second only to agriculture. 1 in 10 non-farm workers in India earns a living from this sector. By 2030, the market is on track to cross $1 trillion in value, driven by urbanisation, business formalisation, and India's rise as a global hub. These are structural shifts. They do not reverse.\n\nWithin this sector, real estate splits into two distinct worlds: residential and commercial. Residential is where people live. Commercial is where business happens. The two operate on different logic, different cycles, and different stakeholders." },
      { id: 'ch1-s01-takeaway', label: 'Takeaway',        type: 'input',    group: 'S01 — Indian Real Estate: The Big Picture', default: '"We shape our buildings; thereafter they shape us." — Winston Churchill' },
      { id: 'ch1-s02-title',    label: 'Title',           type: 'input',    group: 'S02 — Residential vs Commercial', default: 'Residential vs Commercial' },
      { id: 'ch1-s02-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S02 — Residential vs Commercial', default: 'The difference between residential and commercial real estate, and why they behave like separate industries.' },
      { id: 'ch1-s02-body',     label: 'Body',            type: 'textarea', group: 'S02 — Residential vs Commercial', default: "Real estate is one term, but it represents two fundamentally different markets.\n\nResidential real estate is deeply personal. People buy homes to build a life, provide security for their families, improve their lifestyle, and create a place they can call their own. For most families, purchasing a home is one of the largest emotional and financial decisions they will ever make. It is driven as much by aspiration and sentiment as it is by economics.\n\nCommercial real estate, by contrast, is driven by business needs. Companies require land and infrastructure to build products, deliver services, hire talent, serve customers, and generate economic activity.\n\nThis distinction matters because the two markets operate differently. A family may spend years planning the purchase of a home and make that decision only once or twice in a lifetime. Businesses, however, evaluate real estate through a structured lens — assessing location, cost, customer access, talent availability, operational efficiency, and scalability.\n\nResidential real estate is about where people live. Commercial real estate is about where economic activity happens. One fulfills personal aspirations; the other powers business growth, employment, investment, and economic development." },
      { id: 'ch1-s02-takeaway', label: 'Takeaway',        type: 'input',    group: 'S02 — Residential vs Commercial', default: 'Residential sells dreams. Commercial solves problems.' },
      { id: 'ch1-s03-title',    label: 'Title',           type: 'input',    group: 'S03 — Commercial Real Estate (CRE)', default: 'Commercial Real Estate (CRE)' },
      { id: 'ch1-s03-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S03 — Commercial Real Estate (CRE)', default: 'Understand the major segments of commercial real estate, the key stakeholders involved, and the broader ecosystem that supports the industry.' },
      { id: 'ch1-s03-body',     label: 'Body',            type: 'textarea', group: 'S03 — Commercial Real Estate (CRE)', default: "Commercial Real Estate (CRE) refers to properties used for business, commercial, industrial, institutional, or income-generating activities. It forms the physical infrastructure that enables economic activity and business growth.\n\nCommercial real estate is the physical infrastructure that makes economic activity possible — the offices where deals get closed, the warehouses where goods get dispatched, the campuses where 10,000 employees show up on Monday morning.\n\nCRE covers a lot of ground. Grade A office towers in BKC. Last-mile logistics parks outside Pune. Retail high streets in Connaught Place. Industrial corridors along the Delhi-Mumbai Expressway.\n\nCRE is not a monolith. It's a system — of developers who build, operators who run, occupiers who lease, and investors who hold." },
      { id: 'ch1-s04-title',    label: 'Title',           type: 'input',    group: 'S04 — Office Leasing: Conventional vs Flex', default: 'Office Leasing: Conventional vs Flex' },
      { id: 'ch1-s04-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S04 — Office Leasing: Conventional vs Flex', default: 'The two routes through which companies get office space, and how each journey unfolds.' },
      { id: 'ch1-s04-body',     label: 'Body',            type: 'textarea', group: 'S04 — Office Leasing: Conventional vs Flex', default: "Within office real estate, companies today have two primary ways to occupy space: conventional leasing and flex leasing.\n\nConventional leasing is the traditional model. A company leases space directly from a developer or landlord, signs a long-term lease, mostly invests in fit-outs and furniture, manages facility operations, and takes responsibility for running the office. This approach offers maximum customization and control but requires significant capital investment, longer setup timelines, and multi-year commitments.\n\nFlex leasing follows a different model. Instead of dealing directly with the building owner, the company leases space from a flexible workspace operator that has already designed, furnished, and operationalized the office. The operator manages infrastructure, amenities, maintenance, and day-to-day operations, allowing the occupier to move in and become operational almost immediately." },
      { id: 'ch1-s04-takeaway', label: 'Takeaway',        type: 'input',    group: 'S04 — Office Leasing: Conventional vs Flex', default: 'Conventional and flex are two distinct ecosystems — same buildings, fundamentally different journeys for the occupier.' },
      { id: 'ch1-s05-title',    label: 'Title',           type: 'input',    group: 'S05 — Key Stakeholders in Office Leasing', default: 'Key Stakeholders in Office Leasing' },
      { id: 'ch1-s05-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S05 — Key Stakeholders in Office Leasing', default: 'Players in the Office Leasing Ecosystem and Their Value Addition Across the Leasing Funnel.' },
      { id: 'ch1-s05-body',     label: 'Body',            type: 'textarea', group: 'S05 — Key Stakeholders in Office Leasing', default: "Office leasing is not a single transaction but a coordinated process involving multiple participants. From creating office inventory and sourcing options to negotiating leases, executing fit-outs, and managing workplace operations, different stakeholders play specialized roles. Developers, occupiers, brokers, operators, consultants, legal advisors, and service providers work together to deliver a functional workplace solution." },
      { id: 'ch1-s05-takeaway', label: 'Takeaway',        type: 'input',    group: 'S05 — Key Stakeholders in Office Leasing', default: 'Understanding all five players — and what each one adds — is what separates a transaction executor from a trusted advisor.' },
      { id: 'ch1-s06-title',    label: 'Title',           type: 'input',    group: 'S06 — Where myHQ Fits', default: 'Where myHQ Fits' },
      { id: 'ch1-s06-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S06 — Where myHQ Fits', default: "What myHQ does, where it sits in the market, and what makes its model distinctive." },
      { id: 'ch1-s06-body',     label: 'Body',            type: 'textarea', group: 'S06 — Where myHQ Fits', default: "Every office leasing transaction typically involves two important intermediaries: a platform that enables digital search and discovery, and a consultant who guides the client through the transaction process.\n\nConsultants (IPCs and DPCs) bring market knowledge, relationships, transaction expertise, and negotiation capability. They help occupiers evaluate options, benchmark commercial terms, and navigate complex lease negotiations. However, their discovery process is primarily offline and relationship-driven.\n\nListing Platforms solve the digital search and discovery problem by aggregating available options in one place. They provide transparency, scale, and self-service access to the market. However, they typically offer limited advisory support.\n\nmyHQ combines both models. It brings together the scale and transparency of a digital marketplace with the expertise of a leasing consultant. Clients benefit from broad market visibility while also receiving guidance on requirement assessment, space shortlisting, site evaluations, commercial negotiations, and deal closure." },
      { id: 'ch1-s07-title',    label: 'Title',           type: 'input',    group: 'S07 — Market Data', default: 'Market Data' },
      { id: 'ch1-s07-body',     label: 'Body',            type: 'textarea', group: 'S07 — Market Data', default: "Key market metrics for reference. These numbers give you credibility in client conversations and help you understand the scale of the opportunity." },
      { id: 'ch1-s08-title',    label: 'Title',           type: 'input',    group: 'S08 — The 2030 View', default: 'The 2030 View' },
      { id: 'ch1-s08-body',     label: 'Body',            type: 'textarea', group: 'S08 — The 2030 View', default: "India's office market is built on strong structural foundations — and most of them point in the same direction: toward flexibility." },
    ],
    assessFields: [
      { id: 'ch1-assess-q1', label: 'Question 1', type: 'textarea', default: 'Compare Commercial Real Estate (CRE) and Residential Real Estate across factors such as supply, demand, user personas, decision-making, emotional drivers, investment objectives, transaction processes, and market dynamics. What are the key similarities and differences?' },

auth.onAuthStateChanged(async function(user) {
  if (!user) { window.location.href = 'landing.html'; return; }
  const snap = await db.collection('users').doc(user.uid).get();
  if (!snap.exists) { window.location.href = 'hub.html'; return; }
  const data = snap.data();
  if (!data.isAdmin && !data.masterAdmin) { window.location.href = 'hub.html'; return; }
  isMasterAdmin = !!data.masterAdmin;
  loadAllUsers();
  renderCoursePills();
  renderChapterPills();
});

/* ── Tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['access','edit'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'edit') refreshPillStatuses();
}

/* ── Search user ── */
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('user-result').classList.remove('visible');
  document.getElementById('unlock-card').style.display = 'none';
  currentUser = null;
  currentUserDoc = null;
}

async function searchUser() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  if (!query) return;
  // First try exact email match
  let snap = await db.collection('users').where('email', '==', query).limit(1).get();
  if (!snap.empty) { loadUserResult(snap.docs[0]); return; }
  // Fall back: load all users and find first match by name or email contains query
  const all = await db.collection('users').get();
  const match = all.docs.find(doc => {
    const d = doc.data();
    return (d.email || '').toLowerCase().includes(query) || (d.name || '').toLowerCase().includes(query);
  });
  if (!match) { alert('No user found matching "' + query + '".'); return; }
  loadUserResult(match);
}

function loadUserResult(doc) {
  currentUser    = doc.id;
  currentUserDoc = doc.data();
  const d = currentUserDoc;
  const resultEl = document.getElementById('user-result');
  document.getElementById('result-avatar').textContent = (d.name || d.email || '?')[0].toUpperCase();
  document.getElementById('result-name').textContent   = d.name || '—';
  document.getElementById('result-email').textContent  = d.email || '—';
  const ll = d.lastLogin ? new Date(d.lastLogin.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
  document.getElementById('result-lastlogin').textContent = 'Last login: ' + ll;

  const adminArea = document.getElementById('result-admin-area');
  if (d.masterAdmin) {
    adminArea.innerHTML = '<span class="master-badge">Master Admin</span>';
  } else {
    adminArea.innerHTML = `
      <span class="admin-label">Admin access</span>
      <label class="toggle">
        <input type="checkbox" id="admin-toggle" ${d.isAdmin ? 'checked' : ''} onchange="toggleAdmin(this.checked)">
        <span class="toggle-slider"></span>
      </label>`;
  }

  resultEl.classList.add('visible');
  document.getElementById('unlock-card').style.display = '';
  selectCourse('beginner', document.querySelector('.course-pill'));
}

async function toggleAdmin(checked) {
  if (!currentUser) return;
  await db.collection('users').doc(currentUser).update({ isAdmin: checked });
  currentUserDoc.isAdmin = checked;
  loadAllUsers();
}

/* ── Course selection ── */
function selectCourse(course, btn) {
  selectedCourse = course;
  document.querySelectorAll('.course-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderChapterList();
}

function renderChapterList() {
  const list   = document.getElementById('chapter-list');
  const groups = COURSES[selectedCourse];
  if (!groups || groups.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:var(--blue-soft);padding:12px 0;">Coming soon — no chapters available yet.</p>';
    return;
  }
  const unlocked = (currentUserDoc?.unlockedChapters?.[selectedCourse] || []);
  const progress = currentUserDoc?.progress || {};

  list.innerHTML = groups.map(group => {
    const rows = group.chapters.map(ch => {
      if (!ch.available) {
        return `<div class="chapter-row dimmed">
          <div><div class="chapter-name">${ch.name}</div>${ch.desc ? `<div class="chapter-desc">${ch.desc}</div>` : ''}</div>
          <button class="unlock-pill na">Coming Soon</button>
        </div>`;
      }
      const isUnlocked  = unlocked.includes(ch.id);
      const chProg      = progress[ch.id] || {};
      const isCompleted = chProg.completed === true;
      const completedAt = chProg.completedAt
        ? new Date(chProg.completedAt.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : null;
      const statusBadge = isCompleted
        ? `<span style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;background:#e6f9e9;color:#2e7d32;border:1px solid #BEE5C2;margin-right:8px;">✓ Completed${completedAt ? ' · ' + completedAt : ''}</span>`
        : '';
      return `<div class="chapter-row" id="row-${ch.id}">
        <div><div class="chapter-name">${ch.name}</div>${ch.desc ? `<div class="chapter-desc">${ch.desc}</div>` : ''}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${statusBadge}
          <button class="unlock-pill ${isUnlocked ? 'unlocked' : 'locked'}" id="pill-${ch.id}" onclick="toggleChapter('${ch.id}', this)">
            ${isUnlocked ? 'Unlocked' : 'Locked'}
          </button>
        </div>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:8px;">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue-soft);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;">${group.section}</div>
      ${rows}
    </div>`;
  }).join('');
}

async function toggleChapter(chId, pill) {
  if (!currentUser) return;
  pill.classList.add('fade');
  setTimeout(() => pill.classList.remove('fade'), 300);

  const ref  = db.collection('users').doc(currentUser);
  const snap = await ref.get();
  const existing = snap.data()?.unlockedChapters?.[selectedCourse] || [];
  let updated;
  if (existing.includes(chId)) {
    updated = existing.filter(id => id !== chId);
  } else {
    updated = [...existing, chId];
  }
  await ref.update({ [`unlockedChapters.${selectedCourse}`]: updated });
  if (!currentUserDoc.unlockedChapters) currentUserDoc.unlockedChapters = {};
  currentUserDoc.unlockedChapters[selectedCourse] = updated;
  renderChapterList();
}

/* ── All users table ── */
const PAGE_SIZE    = 8;
const COLLAPSED    = 8;
let allUsersData   = [];
let currentPage    = 1;
let isExpanded     = false;

async function loadAllUsers() {
  const snap = await db.collection('users').orderBy('lastLogin', 'desc').get();
  allUsersData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  document.getElementById('users-count').textContent = allUsersData.length + ' users';
  currentPage = 1;
  isExpanded  = false;
  renderUsersTable();
}

function renderUsersTable() {
  const tbody    = document.getElementById('users-tbody');
  const footer   = document.getElementById('users-footer');
  const showBtn  = document.getElementById('show-all-btn');
  const pagCtrl  = document.getElementById('pagination-controls');
  const pageInd  = document.getElementById('page-indicator');
  const total    = allUsersData.length;

  let rows;
  if (!isExpanded) {
    // Collapsed: show first COLLAPSED rows only
    rows = allUsersData.slice(0, COLLAPSED);
  } else {
    // Expanded + paginated
    const start = (currentPage - 1) * PAGE_SIZE;
    rows = allUsersData.slice(start, start + PAGE_SIZE);
  }

  tbody.innerHTML = rows.map(d => {
    const ll = d.lastLogin ? new Date(d.lastLogin.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
    const badge = d.masterAdmin
      ? '<span class="badge-master">Master Admin</span>'
      : d.isAdmin ? '<span class="badge-admin">Admin</span>' : '';
    return `<tr onclick="loadUserResultById('${d.id}')">
      <td>${d.name || '—'}</td>
      <td style="font-family:var(--mono);font-size:11px;">${d.email || '—'}</td>
      <td style="font-family:var(--mono);font-size:11px;">${ll}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  // Footer visibility
  if (total <= COLLAPSED) {
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'flex';

  if (!isExpanded) {
    showBtn.textContent = `Show all ${total} users ↓`;
    pagCtrl.style.display = 'none';
  } else {
    const totalPages = Math.ceil(total / PAGE_SIZE);
    showBtn.textContent = 'Show less ↑';
    pagCtrl.style.display = 'flex';
    pageInd.textContent = `Page ${currentPage} of ${totalPages}`;
    // Disable prev/next at boundaries
    pagCtrl.querySelectorAll('button')[0].disabled = currentPage === 1;
    pagCtrl.querySelectorAll('button')[1].disabled = currentPage === totalPages;
  }
}

function toggleShowAll() {
  isExpanded  = !isExpanded;
  currentPage = 1;
  renderUsersTable();
}

function changePage(dir) {
  const totalPages = Math.ceil(allUsersData.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
  renderUsersTable();
}

async function loadUserResultById(uid) {
  const snap = await db.collection('users').doc(uid).get();
  if (snap.exists) {
    document.getElementById('search-input').value = snap.data().email || '';
    loadUserResult(snap);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* ── Edit chapter tab ── */
let debounceTimer    = null;
let currentChapterId = null;
let currentEditCourse = 'beginner';
let currentEditTab   = 'slide';
let liveData         = {};
let draftData        = {};
let fieldAccepted    = {};

function selectEditCourse(course) {
  currentEditCourse = course;
  refreshPillStatuses();
  document.getElementById('edit-editor-card').style.display = 'none';
  document.getElementById('diff-card').style.display = 'none';
}

// pillStatuses: chId -> { hasDraft: bool, draftStatus: 'pending'|null }
let pillStatuses = {};

const COURSE_LABELS = { beginner: '01 Beginner', intermediate: '02 Intermediate', advanced: '03 Advanced' };

function renderCoursePills() {
  const el = document.getElementById('edit-course-pills');
  el.innerHTML = Object.keys(COURSE_LABELS).map(course => {
    const groups = COURSES[course] || [];
    const available = groups.flatMap(g => g.chapters.filter(c => c.available));
    const hasPending = isMasterAdmin && available.some(ch => {
      const s = pillStatuses[ch.id] || {};
      return s.hasDraft && s.draftStatus === 'pending';
    });
    const isActive = course === currentEditCourse;
    return `<button class="course-pill${isActive ? ' active' : ''}${hasPending ? ' has-pending' : ''}"
      onclick="selectEditCourse('${course}', this)">${COURSE_LABELS[course]}${hasPending ? ' ●' : ''}</button>`;
  }).join('');
}

function renderChapterPills() {
  const pillsEl = document.getElementById('edit-chapter-pills');
  const groups  = COURSES[currentEditCourse] || [];
  const available = groups.flatMap(g => g.chapters.filter(c => c.available));
  if (available.length === 0) {
    pillsEl.innerHTML = '<span style="font-size:12px;color:var(--blue-soft);">No chapters available yet.</span>';
    return;
  }
  pillsEl.innerHTML = available.map(ch => {
    const s = pillStatuses[ch.id] || {};
    const isPending = isMasterAdmin && s.hasDraft && s.draftStatus === 'pending';
    const callout = isPending ? `<span class="pill-callout status-pending">Pending review</span>` : '';
    return `<div class="pill-wrap">
      <button class="chapter-pill${isPending ? ' has-pending' : ''}" id="pill-${ch.id}" onclick="loadChapter('${ch.id}', this)">${ch.name}</button>
      <span id="callout-${ch.id}">${callout}</span>
    </div>`;
  }).join('');
}

async function refreshPillStatuses() {
  const allChapters = Object.values(COURSES).flat().flatMap(g => g.chapters).filter(c => c.available);
  await Promise.all(allChapters.map(async ch => {
    const [draftSnap, liveSnap] = await Promise.all([
      db.collection('content-drafts').doc(ch.id).get(),
      db.collection('content').doc(ch.id).get()
    ]);
    if (draftSnap.exists) {
      const d = draftSnap.data();
      const live = liveSnap.exists ? liveSnap.data() : {};
      // Only count keys that actually differ from live (ignore _draftStatus)
      const realChanges = Object.keys(d).filter(k => k !== '_draftStatus' && d[k] !== live[k]);
      if (realChanges.length > 0) {
        pillStatuses[ch.id] = { hasDraft: true, draftStatus: d._draftStatus || 'pending' };
      } else {
        // Stale doc — clean it up
        db.collection('content-drafts').doc(ch.id).delete();
        pillStatuses[ch.id] = { hasDraft: false, draftStatus: null };
      }
    } else {
      pillStatuses[ch.id] = { hasDraft: false, draftStatus: null };
    }
  }));
  renderCoursePills();
  renderChapterPills();
}

function updatePillStatus(chId, hasDraft, draftStatus) {
  pillStatuses[chId] = { hasDraft, draftStatus };
  // Refresh callout for this chapter
  const calloutEl = document.getElementById('callout-' + chId);
  const pillEl    = document.getElementById('pill-' + chId);
  const isPending = isMasterAdmin && hasDraft && draftStatus === 'pending';
  if (calloutEl) calloutEl.innerHTML = isPending ? `<span class="pill-callout status-pending">Pending review</span>` : '';
  if (pillEl) {
    pillEl.classList.toggle('has-pending', isPending);
  }
  // Re-render course pills to update their highlight
  renderCoursePills();
}

async function loadChapter(chId, btn) {
  currentChapterId = chId;
  document.querySelectorAll('.chapter-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const def = CHAPTER_DEFS[chId];
  if (!def) return;
  document.getElementById('edit-chapter-label').textContent = def.label;
  document.getElementById('draft-indicator').textContent = '';
  document.getElementById('sync-msg').textContent = '';
  document.getElementById('diff-card').style.display = 'none';
  document.getElementById('edit-editor-card').style.display = '';
  fieldAccepted = {};

  // Load live + draft in parallel
  const [liveSnap, draftSnap] = await Promise.all([
    db.collection('content').doc(chId).get(),
    db.collection('content-drafts').doc(chId).get()
  ]);
  liveData  = liveSnap.exists  ? liveSnap.data()  : {};

  // Build set of fields that intentionally store HTML (html:true in CHAPTER_DEFS)
  const allFieldDefs = [...def.slideFields, ...def.contentFields, ...def.assessFields];
  const htmlFieldIds = new Set(allFieldDefs.filter(f => f.html).map(f => f.id));

  // Strip stale HTML tags from non-body/outcome/html fields (cleanup from old data)
  Object.keys(liveData).forEach(k => {
    if (k.indexOf('-body') === -1 && k.indexOf('-outcome') === -1 && !htmlFieldIds.has(k) && typeof liveData[k] === 'string') {
      liveData[k] = stripHtml(liveData[k]);
    }
  });

  const rawDraft = draftSnap.exists ? draftSnap.data() : {};

  // Seed Firestore with defaults for any field not yet written,
  // and re-seed html:true fields whose stored value was stripped of HTML tags
  const allFields = [...def.slideFields, ...def.contentFields, ...def.assessFields];
  const missing = {};
  allFields.forEach(f => {
    if (f.default === '') return;
    const stored = liveData[f.id];
    if (stored === undefined) {
      missing[f.id] = f.default;
    } else if (f.html && typeof stored === 'string' && /<[^>]+>/.test(f.default) && !/<[^>]+>/.test(stored)) {
      // Stored value has no HTML but the default does — plain-text was saved previously; restore
      missing[f.id] = f.default;
    }
  });
  if (Object.keys(missing).length) {
    await db.collection('content').doc(chId).set(missing, { merge: true });
    Object.assign(liveData, missing);
  }

  // Strip draft fields identical to live (stale/rejected values) and _draftStatus
  draftData = {};
  Object.keys(rawDraft).forEach(k => {
    if (k === '_draftStatus') return;
    let val = rawDraft[k];
    if (k.indexOf('-body') === -1 && k.indexOf('-outcome') === -1 && !htmlFieldIds.has(k) && typeof val === 'string') {
      val = stripHtml(val);
    }
    if (val !== liveData[k]) draftData[k] = val;
  });

  // If no real content differences remain, delete the draft doc entirely
  if (Object.keys(draftData).length === 0 && draftSnap.exists) {
    db.collection('content-drafts').doc(chId).delete();
    updatePillStatus(chId, false, null);
  }

  currentEditTab = 'slide';
  ['slide','content','assess'].forEach(t => {
    const el = document.getElementById('subtab-' + t);
    if (el) el.classList.toggle('active', t === 'slide');
  });
  renderEditFields();

  updateSyncArea();
}

function updateSyncArea() {
  const syncArea = document.getElementById('sync-area');
  if (!syncArea) return;
  const hasDraft = Object.keys(draftData).filter(k => k !== '_draftStatus').length > 0;
  if (!hasDraft) { syncArea.innerHTML = ''; return; }
  const badge = `<span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;">Submitted for Review</span>`;
  if (isMasterAdmin) {
    syncArea.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">${badge}<button class="sync-btn" onclick="showDiff()">Review Changes →</button></div>`;
  } else {
    syncArea.innerHTML = badge;
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function stripHtml(str) {
  return String(str).replace(/<[^>]*>/g, '');
}

function switchEditTab(tab) {
  currentEditTab = tab;
  ['slide','content','assess'].forEach(t => {
    const el = document.getElementById('subtab-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  renderEditFields();
}

function renderEditFields() {
  const def = CHAPTER_DEFS[currentChapterId];
  if (!def) return;
  const fields = currentEditTab === 'slide'   ? def.slideFields
               : currentEditTab === 'content' ? def.contentFields
               : def.assessFields;

  let html = '';
  let lastGroup = null;
  fields.forEach(f => {
    const val = draftData[f.id] !== undefined ? draftData[f.id]
              : liveData[f.id]  !== undefined ? liveData[f.id]
              : f.default;
    const group = f.group || null;
    if (group && group !== lastGroup) {
      html += `<div style="margin:${lastGroup === null ? '0' : '28px'} 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);">
        <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-soft);">${escHtml(group)}</span>
      </div>`;
      lastGroup = group;
    }
    if (f.type === 'textarea' || f.html) {
      const dispVal = f.html ? val : escHtml(val);
      const hint = f.html ? ' <span style="font-family:var(--mono);font-size:8px;color:var(--blue-soft);font-weight:600;letter-spacing:0.08em;">HTML</span>' : '';
      html += `<div class="edit-field">
        <label class="edit-label" for="field-${f.id}">${f.label}${hint}</label>
        <textarea class="edit-input" id="field-${f.id}" rows="${f.html ? 3 : 4}"
          placeholder="${escHtml(f.placeholder || '')}"
          oninput="scheduleDraftSave()" style="resize:vertical;min-height:${f.html ? '54px' : '80px'};font-family:var(--mono);font-size:${f.html ? '11px' : 'inherit'};">${dispVal}</textarea>
      </div>`;
    } else {
      html += `<div class="edit-field">
        <label class="edit-label" for="field-${f.id}">${f.label}</label>
        <input class="edit-input" id="field-${f.id}" type="text"
          value="${escHtml(val)}"
          placeholder="${escHtml(f.placeholder || '')}"
          oninput="scheduleDraftSave()" />
      </div>`;
    }
  });
  document.getElementById('edit-fields').innerHTML = html;
}

function scheduleDraftSave() {
  clearTimeout(debounceTimer);
  document.getElementById('draft-indicator').textContent = 'Saving draft…';
  debounceTimer = setTimeout(saveDraft, 500);
}

async function saveDraft() {
  const def = CHAPTER_DEFS[currentChapterId];
  const data = {};
  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    const el = document.getElementById('field-' + f.id);
    if (el) data[f.id] = el.value !== undefined ? el.value : el.textContent;
  });
  draftData = { ...draftData, ...data };
  data._draftStatus = 'pending';
  await db.collection('content-drafts').doc(currentChapterId).set(data, { merge: true });
  document.getElementById('draft-indicator').textContent = 'Draft saved ✓';
  updatePillStatus(currentChapterId, true, 'pending');
  updateSyncArea();
}

// fieldAccepted: null = pending, true = accepted, false = rejected
// changedFields: set of field ids that actually differ from live

let changedFields = new Set();

function showDiff() {
  const def = CHAPTER_DEFS[currentChapterId];
  fieldAccepted = {};
  changedFields = new Set();

  const currentDraft = {};
  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    const el = document.getElementById('field-' + f.id);
    if (el) currentDraft[f.id] = el.value;
  });

  const rows = [...def.slideFields, ...def.contentFields, ...def.assessFields].map(f => {
    const live  = liveData[f.id]    !== undefined ? liveData[f.id]    : f.default;
    const draft = currentDraft[f.id] !== undefined ? currentDraft[f.id] : f.default;
    const changed = live !== draft;

    if (!changed) return '';

    fieldAccepted[f.id] = null; // pending — not yet decided
    changedFields.add(f.id);

    const liveDisplay  = f.html ? live  : escHtml(live);
    const draftDisplay = f.html ? draft : escHtml(draft);
    return `<div class="diff-row" id="diff-row-${f.id}">
      <div class="diff-field-label">${escHtml(f.label)}</div>
      <div class="diff-old">
        <span style="font-family:var(--mono);font-size:8px;color:#c62828;letter-spacing:0.06em;display:block;margin-bottom:4px;">LIVE</span>
        ${liveDisplay}
      </div>
      <div class="diff-new">
        <span style="font-family:var(--mono);font-size:8px;color:#2e7d32;letter-spacing:0.06em;display:block;margin-bottom:4px;padding:8px 10px 0;">DRAFT
          <button class="diff-new-edit-btn" id="edit-btn-${f.id}" onclick="toggleDraftEdit('${f.id}')">Edit</button>
        </span>
        <span class="diff-new-text" id="draft-text-${f.id}">${draftDisplay}</span>
        <textarea class="diff-new-input" id="draft-input-${f.id}" oninput="onDraftInputChange('${f.id}')">${escHtml(draft)}</textarea>
      </div>
      <div class="diff-actions">
        <button class="diff-accept" id="accept-${f.id}" onclick="toggleFieldAccept('${f.id}', true)">✓ Accept</button>
        <button class="diff-reject" id="reject-${f.id}" onclick="toggleFieldAccept('${f.id}', false)">✕ Reject</button>
      </div>
    </div>`;
  }).join('');

  // No actual changes — clear draft and return to editor
  if (changedFields.size === 0) {
    db.collection('content-drafts').doc(currentChapterId).delete();
    draftData = {};
    updatePillStatus(currentChapterId, false, null);
    updateSyncArea();
    return;
  }

  document.getElementById('diff-rows').innerHTML = rows;
  document.getElementById('diff-chapter-label').textContent = def.label;
  document.getElementById('sync-msg').textContent = '';
  document.getElementById('push-live-btn').disabled = true;
  document.getElementById('edit-editor-card').style.display = 'none';
  document.getElementById('diff-card').style.display = '';
}

function toggleDraftEdit(fieldId) {
  const textEl  = document.getElementById('draft-text-' + fieldId);
  const inputEl = document.getElementById('draft-input-' + fieldId);
  const btnEl   = document.getElementById('edit-btn-' + fieldId);
  const editing = inputEl.style.display === 'block';
  if (editing) {
    // save edit back
    const newVal = inputEl.value;
    textEl.textContent = newVal;
    textEl.style.display = 'block';
    inputEl.style.display = 'none';
    btnEl.textContent = 'Edit';
    // if field was already accepted, re-evaluate against live
    const live = liveData[fieldId] !== undefined ? liveData[fieldId] : '';
    if (newVal === live) {
      // no longer different — remove from changedFields
      changedFields.delete(fieldId);
      delete fieldAccepted[fieldId];
      const row = document.getElementById('diff-row-' + fieldId);
      if (row) row.style.display = 'none';
    }
    updatePushButton();
  } else {
    textEl.style.display = 'none';
    inputEl.style.display = 'block';
    inputEl.focus();
    btnEl.textContent = 'Done';
  }
}

function onDraftInputChange(fieldId) {
  // sync text preview live while editing
  const inputEl = document.getElementById('draft-input-' + fieldId);
  const textEl  = document.getElementById('draft-text-' + fieldId);
  if (textEl) textEl.textContent = inputEl.value;
}

function showEditorView() {
  document.getElementById('diff-card').style.display = 'none';
  document.getElementById('edit-editor-card').style.display = '';
  renderEditFields();
  updateSyncArea();
}

function toggleFieldAccept(fieldId, accept) {
  // If clicking the already-active state, deselect (back to pending)
  const current = fieldAccepted[fieldId];
  const newState = (current === accept) ? null : accept;
  fieldAccepted[fieldId] = newState;

  const row       = document.getElementById('diff-row-' + fieldId);
  const acceptBtn = document.getElementById('accept-' + fieldId);
  const rejectBtn = document.getElementById('reject-' + fieldId);
  if (!row) return;

  if (newState === false) {
    // Rejected — remove from draft immediately and hide the row
    delete draftData[fieldId];
    const remainingKeys = Object.keys(draftData);
    if (remainingKeys.length > 0) {
      const remaining = { _draftStatus: 'pending' };
      remainingKeys.forEach(k => { remaining[k] = draftData[k]; });
      db.collection('content-drafts').doc(currentChapterId).set(remaining);
      updatePillStatus(currentChapterId, true, 'pending');
    } else {
      db.collection('content-drafts').doc(currentChapterId).delete();
      updatePillStatus(currentChapterId, false, null);
    }
    row.style.display = 'none';
    // If all changed fields are now rejected (no visible rows), go back to editor
    const allDecided = [...changedFields].every(id => fieldAccepted[id] === false);
    if (allDecided) {
      draftData = {};
      showEditorView();
      return;
    }
    updatePushButton();
    return;
  }

  acceptBtn.classList.toggle('active', newState === true);
  rejectBtn.classList.toggle('active', newState === false);
  row.classList.remove('state-accepted', 'state-rejected');
  if (newState === true) row.classList.add('state-accepted');

  updatePushButton();
}

function updatePushButton() {
  // Push enabled as soon as at least one field is accepted — pending fields are simply skipped
  const anyAccepted = [...changedFields].some(id => fieldAccepted[id] === true);
  document.getElementById('push-live-btn').disabled = !anyAccepted;
}

function acceptAllFields() {
  changedFields.forEach(id => {
    if (fieldAccepted[id] !== true) toggleFieldAccept(id, true);
  });
}

function rejectAllFields() {
  changedFields.forEach(id => { fieldAccepted[id] = false; });
  draftData = {};
  db.collection('content-drafts').doc(currentChapterId).delete();
  updatePillStatus(currentChapterId, false, null);
  showEditorView();
}

async function pushLive() {
  const def = CHAPTER_DEFS[currentChapterId];
  const toWrite = {};
  const acceptedIds = new Set();
  const rejectedIds = new Set();

  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    if (fieldAccepted[f.id] === true) {
      const inputEl = document.getElementById('draft-input-' + f.id);
      const textEl  = document.getElementById('draft-text-' + f.id);
      toWrite[f.id] = (inputEl && inputEl.style.display === 'block') ? inputEl.value : (textEl ? textEl.textContent : (draftData[f.id] || ''));
      acceptedIds.add(f.id);
    } else if (fieldAccepted[f.id] === false) {
      rejectedIds.add(f.id);
    }
  });

  const btn = document.getElementById('push-live-btn');
  btn.disabled = true;
  btn.textContent = 'Pushing…';

  await db.collection('content').doc(currentChapterId).set(toWrite, { merge: true });
  liveData = { ...liveData, ...toWrite };

  // Remove accepted + rejected from local draftData
  acceptedIds.forEach(k => delete draftData[k]);
  rejectedIds.forEach(k => delete draftData[k]);

  // Strip any remaining keys that are no longer different from live (stale entries)
  Object.keys(draftData).forEach(k => {
    if (liveData[k] === draftData[k]) delete draftData[k];
  });

  // If genuinely pending fields remain, rewrite draft doc; else delete entirely
  const remainingKeys = Object.keys(draftData);
  if (remainingKeys.length > 0) {
    const remaining = { _draftStatus: 'pending' };
    remainingKeys.forEach(k => { remaining[k] = draftData[k]; });
    await db.collection('content-drafts').doc(currentChapterId).set(remaining);
  } else {
    await db.collection('content-drafts').doc(currentChapterId).delete();
    draftData = {};
  }

  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  document.getElementById('sync-msg').textContent = `Pushed live at ${hhmm} — accepted changes visible to all users.`;
  btn.textContent = 'Push to Live →';
  updatePillStatus(currentChapterId, remainingKeys.length > 0, remainingKeys.length > 0 ? 'pending' : null);
  setTimeout(showEditorView, 1600);
}
</script>
