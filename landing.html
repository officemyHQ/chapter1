<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myHQ — Sales L&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #1A1E9E;
  --blue-mid:   #4A4FD4;
  --blue-soft:  #7B7FE8;
  --blue-pale:  #C7C9F5;
  --blue-wash:  #F0F0FD;
  --white:      #FFFFFF;
  --border:     rgba(26,30,158,0.12);
  --border-mid: rgba(26,30,158,0.2);
  --sans:       'Manrope', system-ui, sans-serif;
  --mono:       'JetBrains Mono', ui-monospace, monospace;
  --ease:       cubic-bezier(0.22, 1, 0.36, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
::selection { background: var(--blue); color: var(--white); }

body {
  font-family: var(--sans);
  background: var(--white);
  color: var(--blue);
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
.topbar {
  height: 52px;
  padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  background: var(--white);
  z-index: 10;
  flex-shrink: 0;
}
.topbar-rule {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--blue);
}
.brand-mark {
  height: 36px; width: auto;
}
.topbar-tag {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--blue);
}

/* ── Main layout ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 65fr 35fr;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── Left panel ── */
.left {
  padding: 56px 64px;
  display: flex; flex-direction: column; justify-content: center;
  border-right: 1px solid var(--border);
  background: transparent;
  gap: 48px;
  position: relative;
}

.left-content {
  display: contents;
}

.headline {
  font-size: clamp(2.8rem, 4.2vw + 0.5rem, 5rem);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: -0.045em;
  color: var(--blue);
  margin-bottom: 16px;
}
.headline-sub {
  font-size: clamp(2.8rem, 4.2vw + 0.5rem, 5rem);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: -0.045em;
  color: var(--blue-pale);
}
.dot-sep {
  color: var(--blue-pale);
  margin: 0 2px;
}

.courses-heading {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-bottom: 12px;
}

.courses-list {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
}

.course-card {
  background: var(--white);
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: background 0.22s var(--ease);
  cursor: default;
}
.course-card:last-child { border-bottom: none; }

.course-card::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--blue);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform 0.25s var(--ease);
}
.course-card:hover { background: var(--blue-wash); }
.course-card:hover::after { transform: scaleY(1); }

.card-inner {
  display: flex; align-items: center; gap: 20px;
  padding: 20px 24px;
  width: 100%;
}

.card-num {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  color: var(--blue-pale);
  letter-spacing: 0.06em;
  min-width: 32px;
}
.card-body { flex: 1; }
.card-title {
  font-size: 13px; font-weight: 700;
  color: var(--blue);
  letter-spacing: -0.01em;
}
.card-desc {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-top: 4px;
}
.card-arrow {
  font-size: 14px;
  color: var(--blue-pale);
  transition: color 0.2s, transform 0.2s var(--ease);
}
.course-card:hover .card-arrow {
  color: var(--blue);
  transform: translateX(4px);
}

/* ── Right panel ── */
.right {
  background: var(--blue-wash);
  display: flex; flex-direction: column; justify-content: center;
  padding: 36px 40px;
  border-left: 1px solid var(--border);
  position: relative;
  overflow-y: auto;
}

.form-header { margin-bottom: 18px; }
.form-label-top {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.form-label-top::before {
  content: ''; width: 14px; height: 1px;
  background: var(--blue-soft);
}
.form-title {
  font-size: 1.65rem;
  font-weight: 800;
  letter-spacing: -0.035em;
  color: var(--blue);
  line-height: 1.08;
  margin-bottom: 6px;
}
.form-desc {
  font-size: 12px; font-weight: 500;
  color: var(--blue-soft);
  line-height: 1.6;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-mid);
  margin-bottom: 18px;
}

/* Fields */
.field { margin-bottom: 13px; }
.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 8.5px; font-weight: 600;
  letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-bottom: 6px;
}
.field-input {
  width: 100%;
  font-family: var(--sans);
  font-size: 13px; font-weight: 600;
  color: var(--blue);
  padding: 11px 13px;
  background: var(--white);
  border: 1px solid var(--border-mid);
  outline: none;
  border-radius: 0;
  appearance: none;
  transition: border-color 0.18s, box-shadow 0.18s;
  letter-spacing: -0.01em;
}
.field-input::placeholder { color: var(--blue-pale); font-weight: 500; }
.field-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(26,30,158,0.07);
}
.field-input.error { border-color: var(--blue-mid); }

.field-error {
  font-family: var(--mono);
  font-size: 8.5px; font-weight: 600;
  color: var(--blue-mid);
  margin-top: 4px;
  display: none; align-items: center; gap: 5px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.field-error.visible { display: flex; }
.field-hint {
  font-family: var(--mono);
  font-size: 8.5px; font-weight: 500;
  color: var(--blue-pale);
  margin-top: 4px;
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* Course radio */
.radio-group { display: flex; flex-direction: column; gap: 6px; }
.radio-option { cursor: pointer; }
.radio-option input { display: none; }
.radio-label {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--white);
  border: 1px solid var(--border-mid);
  transition: border-color 0.18s, background 0.18s;
  cursor: pointer;
}
.radio-option input:checked + .radio-label {
  border-color: var(--blue);
  background: var(--white);
  box-shadow: inset 3px 0 0 var(--blue);
}
.radio-option:hover .radio-label { border-color: var(--blue-mid); }
.radio-num {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  color: var(--blue-pale);
  letter-spacing: 0.08em;
  min-width: 18px;
}
.radio-option input:checked + .radio-label .radio-num { color: var(--blue); }
.radio-text {
  font-size: 13px; font-weight: 700;
  color: var(--blue);
  letter-spacing: -0.01em;
}

/* Submit */
.btn-submit {
  width: 100%; margin-top: 10px;
  font-family: var(--sans);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--white);
  background: var(--blue);
  border: none; padding: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative;
  transition: background 0.18s var(--ease), transform 0.1s;
}
.btn-submit:hover:not(:disabled) { background: var(--blue-mid); }
.btn-submit:active:not(:disabled) { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-submit.loading .btn-text { visibility: hidden; }
.btn-submit.loading::after {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* API error */
.api-error {
  display: none; margin-top: 10px;
  padding: 11px 13px;
  border: 1px solid var(--border-mid);
  border-left: 2px solid var(--blue-mid);
  font-size: 10px; color: var(--blue-mid);
  font-weight: 600; line-height: 1.65;
  letter-spacing: 0.02em;
  background: var(--white);
}
.api-error.visible { display: block; }
.api-error .link { color: var(--blue); cursor: pointer; text-decoration: underline; }

/* Success */
.success-panel { display: none; flex-direction: column; gap: 20px; }
.success-panel.visible { display: flex; }
.success-title {
  font-size: 1.7rem; font-weight: 800;
  color: var(--blue); letter-spacing: -0.03em; line-height: 1.1;
}
.success-name { color: var(--blue-mid); }
.success-body {
  font-size: 12px; font-weight: 500;
  color: var(--blue-soft); line-height: 1.65;
  padding-left: 14px;
  border-left: 2px solid var(--blue-pale);
}
.course-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.course-list-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--blue-soft); margin-bottom: 4px; }
.course-list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border: 1px solid var(--blue-pale);
  text-decoration: none; cursor: pointer;
  transition: background 0.15s;
}
a.course-list-item { background: #f0f2ff; }
a.course-list-item:hover { background: #e4e7ff; }
.course-list-item.locked { opacity: 0.45; cursor: not-allowed; background: transparent; }
.course-list-num { font-size: 10px; font-weight: 700; color: var(--blue-soft); letter-spacing: 0.1em; width: 20px; }
.course-list-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--blue); }
.course-list-arrow { font-size: 14px; color: var(--blue); }
.course-list-lock { font-size: 12px; }
.signout-btn {
  margin-top: 8px; background: none; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  color: var(--blue-soft); cursor: pointer; padding: 0;
  text-decoration: underline; text-underline-offset: 3px;
  transition: color 0.15s;
}
.signout-btn:hover { color: var(--blue); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-rule"></div>
  <img src="logo_landing_hub/myHQ_logo_landing.png" alt="myHQ" class="brand-mark">
  <span class="topbar-tag">myHQBuddy</span>
</div>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <div class="left-content">

      <div class="headline-block">
        <div class="headline">Learn today<span class="dot-sep">.</span><br>Lead tomorrow<span class="dot-sep">.</span><br>Last forever<span class="dot-sep">.</span></div>
      </div>


    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div id="form-panel">
      <div class="form-header">
        <div class="form-title">Learn · Grow · Succeed</div>
      </div>

      <div class="field">
        <label class="field-label" for="input-username">Username</label>
        <input class="field-input" id="input-username" type="text" placeholder="Enter your username" autocomplete="username">
        <div class="field-error" id="err-username">Enter your username</div>
      </div>

      <div class="field">
        <label class="field-label" for="input-password">Password</label>
        <input class="field-input" id="input-password" type="password" placeholder="Enter your password" autocomplete="current-password">
        <div class="field-error" id="err-password">Enter your password</div>
      </div>

      <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">
        <span class="btn-text">Log In &nbsp;→</span>
      </button>

      <div class="api-error" id="api-error"></div>
    </div>

    <div class="success-panel" id="success-panel">
      <div class="success-title">Welcome,<br><span class="success-name" id="success-name">—</span>.</div>
      <div class="course-list">
        <div class="course-list-label">Your Courses</div>
        <a class="course-list-item" href="hub.html">
          <span class="course-list-num">01</span>
          <span class="course-list-name">Beginner</span>
          <span class="course-list-arrow">→</span>
        </a>
        <div class="course-list-item locked">
          <span class="course-list-num">02</span>
          <span class="course-list-name">Intermediate</span>
          <span class="course-list-lock">🔒</span>
        </div>
        <div class="course-list-item locked">
          <span class="course-list-num">03</span>
          <span class="course-list-name">Advanced</span>
          <span class="course-list-lock">🔒</span>
        </div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>

  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwX0Z5vx6DSwdwZwK26pKZL3V3U9XwEyWgPa9Ek_cFEH1_tpULnWNcn7RlgE-wT8M9M/exec';

document.getElementById('input-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('input-password').focus(); });
document.getElementById('input-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });

function setFieldError(inputId, errId, show, msg) {
  const input = document.getElementById(inputId);
  const err = document.getElementById(errId);
  if (show) {
    input.classList.add('error');
    if (msg) err.textContent = msg;
    err.style.display = 'flex'; err.classList.add('visible');
  } else {
    input.classList.remove('error');
    err.style.display = 'none'; err.classList.remove('visible');
  }
}

async function handleSubmit() {
  const username = document.getElementById('input-username').value.trim();
  const password = document.getElementById('input-password').value.trim();
  const apiError = document.getElementById('api-error');
  apiError.classList.remove('visible');

  let valid = true;
  if (!username) { setFieldError('input-username', 'err-username', true, 'Enter your username'); valid = false; }
  else setFieldError('input-username', 'err-username', false);
  if (!password) { setFieldError('input-password', 'err-password', true, 'Enter your password'); valid = false; }
  else setFieldError('input-password', 'err-password', false);
  if (!valid) return;

  const btn = document.getElementById('submit-btn');
  btn.classList.add('loading'); btn.disabled = true;
  btn.querySelector('.btn-text').textContent = 'Checking…';

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=login&username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password));
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('myhq_name', data.name);
      localStorage.setItem('myhq_email', data.email);
      localStorage.setItem('myhq_course', data.course || 'Beginner Course');
      localStorage.setItem('myhq_registered_at', new Date().toISOString());

      // Restore submitted progress from Sheet so it survives new devices/browsers
      try {
        const progRes = await fetch(APPS_SCRIPT_URL + '?action=getProgress&email=' + encodeURIComponent(data.email));
        const prog = await progRes.json();
        if (prog.found) {
          const prefix = prog.chapter === 'Chapter 2' ? 'myhq_ch2' : 'myhq_ch1';
          localStorage.setItem(prefix + '_answers', JSON.stringify(prog.answers));
          localStorage.setItem(prefix + '_submitted', 'true');
          localStorage.setItem(prefix + '_complete', 'true');
          if (prog.chapter === 'Chapter 1') {
            localStorage.setItem('myhq_ch2_unlocked', 'true');
          }
        }
      } catch (_) { /* non-fatal — progress restore fails silently */ }

      document.getElementById('success-name').textContent = data.name.split(' ')[0];
      document.getElementById('form-panel').style.display = 'none';
      document.getElementById('success-panel').classList.add('visible');
    } else {
      apiError.textContent = 'Wrong username or password. Please try again.';
      apiError.classList.add('visible');
      btn.classList.remove('loading'); btn.disabled = false;
      btn.querySelector('.btn-text').textContent = 'Log In  →';
    }
  } catch {
    apiError.textContent = 'Could not connect. Please try again.';
    apiError.classList.add('visible');
    btn.classList.remove('loading'); btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'Log In  →';
  }
}

function goToHub() { window.location.href = 'hub.html'; }

function signOut() {
  localStorage.removeItem('myhq_name');
  localStorage.removeItem('myhq_email');
  localStorage.removeItem('myhq_registered_at');
  document.getElementById('success-panel').classList.remove('visible');
  document.getElementById('form-panel').style.display = '';
  document.getElementById('input-username').value = '';
  document.getElementById('input-password').value = '';
}

window.addEventListener('DOMContentLoaded', () => {
  const n = localStorage.getItem('myhq_name');
  const e = localStorage.getItem('myhq_email');
  if (n && e) {
    document.getElementById('success-name').textContent = n.split(' ')[0];
    document.getElementById('form-panel').style.display = 'none';
    document.getElementById('success-panel').classList.add('visible');
    return;
  }
});
</script>
</body>
</html>
