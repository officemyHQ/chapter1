<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myHQ — Sales L&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root {
  --blue:       #1A1E9E;
  --blue-mid:   #4A4FD4;
  --blue-soft:  #7B7FE8;
  --blue-pale:  #C7C9F5;
  --blue-wash:  #F0F0FD;
  --white:      #FFFFFF;
  --border:     rgba(26,30,158,0.12);
  --border-mid: rgba(26,30,158,0.2);
  --sans:       'Manrope', system-ui, sans-serif;
  --mono:       'JetBrains Mono', ui-monospace, monospace;
  --ease:       cubic-bezier(0.22, 1, 0.36, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
::selection { background: var(--blue); color: var(--white); }

body {
  font-family: var(--sans);
  background: var(--white);
  color: var(--blue);
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
.topbar {
  height: 52px;
  padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  background: var(--white);
  z-index: 10;
  flex-shrink: 0;
}
.topbar-rule {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--blue);
}
.brand-mark {
  height: 36px; width: auto;
}
.topbar-tag {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--blue);
}

/* ── Main layout ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 65fr 35fr;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── Left panel ── */
.left {
  padding: 56px 64px;
  display: flex; flex-direction: column; justify-content: center;
  border-right: 1px solid var(--border);
  background: transparent;
  gap: 48px;
  position: relative;
}

.left-content {
  display: contents;
}

.headline {
  font-size: clamp(2.8rem, 4.2vw + 0.5rem, 5rem);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: -0.045em;
  color: var(--blue);
  margin-bottom: 16px;
}
.headline-sub {
  font-size: clamp(2.8rem, 4.2vw + 0.5rem, 5rem);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: -0.045em;
  color: var(--blue-pale);
}
.dot-sep {
  color: var(--blue-pale);
  margin: 0 2px;
}

.courses-heading {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-bottom: 12px;
}

.courses-list {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
}

.course-card {
  background: var(--white);
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: background 0.22s var(--ease);
  cursor: default;
}
.course-card:last-child { border-bottom: none; }

.course-card::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--blue);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform 0.25s var(--ease);
}
.course-card:hover { background: var(--blue-wash); }
.course-card:hover::after { transform: scaleY(1); }

.card-inner {
  display: flex; align-items: center; gap: 20px;
  padding: 20px 24px;
  width: 100%;
}

.card-num {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  color: var(--blue-pale);
  letter-spacing: 0.06em;
  min-width: 32px;
}
.card-body { flex: 1; }
.card-title {
  font-size: 13px; font-weight: 700;
  color: var(--blue);
  letter-spacing: -0.01em;
}
.card-desc {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-top: 4px;
}
.card-arrow {
  font-size: 14px;
  color: var(--blue-pale);
  transition: color 0.2s, transform 0.2s var(--ease);
}
.course-card:hover .card-arrow {
  color: var(--blue);
  transform: translateX(4px);
}

/* ── Right panel ── */
.right {
  background: var(--blue-wash);
  display: flex; flex-direction: column; justify-content: center;
  padding: 36px 40px;
  border-left: 1px solid var(--border);
  position: relative;
  overflow-y: auto;
}

.form-header { margin-bottom: 18px; }
.form-label-top {
  font-family: var(--mono);
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--blue-soft);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.form-label-top::before {
  content: ''; width: 14px; height: 1px;
  background: var(--blue-soft);
}
.form-title {
  font-size: 1.65rem;
  font-weight: 800;
  letter-spacing: -0.035em;
  color: var(--blue);
  line-height: 1.08;
  margin-bottom: 6px;
}
.form-desc {
  font-size: 12px; font-weight: 500;
  color: var(--blue-soft);
  line-height: 1.6;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-mid);
  margin-bottom: 18px;
}

/* Submit */
.btn-submit {
  width: 100%; margin-top: 10px;
  font-family: var(--sans);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--white);
  background: var(--blue);
  border: none; padding: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative;
  transition: background 0.18s var(--ease), transform 0.1s;
}
.btn-submit:hover:not(:disabled) { background: var(--blue-mid); }
.btn-submit:active:not(:disabled) { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-submit.loading .btn-text { visibility: hidden; }
.btn-submit.loading::after {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* API error */
.api-error {
  display: none; margin-top: 10px;
  padding: 11px 13px;
  border: 1px solid var(--border-mid);
  border-left: 2px solid var(--blue-mid);
  font-size: 10px; color: var(--blue-mid);
  font-weight: 600; line-height: 1.65;
  letter-spacing: 0.02em;
  background: var(--white);
}
.api-error.visible { display: block; }

/* Success */
.success-panel { display: none; flex-direction: column; gap: 20px; }
.success-panel.visible { display: flex; }
.success-title {
  font-size: 1.7rem; font-weight: 800;
  color: var(--blue); letter-spacing: -0.03em; line-height: 1.1;
}
.success-name { color: var(--blue-mid); }
.course-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.course-list-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--blue-soft); margin-bottom: 4px; }
.course-list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border: 1px solid var(--blue-pale);
  text-decoration: none; cursor: pointer;
  transition: background 0.15s;
}
a.course-list-item { background: #f0f2ff; }
a.course-list-item:hover { background: #e4e7ff; }
.course-list-item.locked { opacity: 0.45; cursor: not-allowed; background: transparent; }
.course-list-num { font-size: 10px; font-weight: 700; color: var(--blue-soft); letter-spacing: 0.1em; width: 20px; }
.course-list-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--blue); }
.course-list-arrow { font-size: 14px; color: var(--blue); }
.course-list-lock { font-size: 12px; }
.signout-btn {
  margin-top: 8px; background: none; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  color: var(--blue-soft); cursor: pointer; padding: 0;
  text-decoration: underline; text-underline-offset: 3px;
  transition: color 0.15s;
}
.signout-btn:hover { color: var(--blue); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-rule"></div>
  <img src="logo_landing_hub/myHQ_logo_landing.png" alt="myHQ" class="brand-mark">
  <span class="topbar-tag">myHQBuddy</span>
</div>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <div class="left-content">
      <div class="headline-block">
        <div class="headline">Learn today<span class="dot-sep">.</span><br>Lead tomorrow<span class="dot-sep">.</span><br>Last forever<span class="dot-sep">.</span></div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- LOGGED OUT: Google sign-in -->
    <div id="signin-panel">
      <div class="form-header">
        <div class="form-label-top">Sign in</div>
        <div class="form-title">Learn · Grow · Succeed</div>
        <div class="form-desc">Use your myHQ Google account to continue.</div>
      </div>
      <button class="btn-submit" id="google-btn" onclick="signInWithGoogle()">
        <span class="btn-text">Sign in with Google &nbsp;→</span>
      </button>
      <div class="api-error" id="auth-error"></div>
    </div>

    <!-- LOGGED IN: welcome + courses -->
    <div class="success-panel" id="success-panel">
      <div class="success-title">Welcome,<br><span class="success-name" id="success-name">—</span>.</div>
      <div class="course-list">
        <div class="course-list-label">Your Courses</div>
        <a class="course-list-item" href="hub.html">
          <span class="course-list-num">01</span>
          <span class="course-list-name">Beginner</span>
          <span class="course-list-arrow">→</span>
        </a>
        <div class="course-list-item locked">
          <span class="course-list-num">02</span>
          <span class="course-list-name">Intermediate</span>
          <span class="course-list-lock">🔒</span>
        </div>
        <div class="course-list-item locked">
          <span class="course-list-num">03</span>
          <span class="course-list-name">Advanced</span>
          <span class="course-list-lock">🔒</span>
        </div>
      </div>
      <button class="signout-btn" onclick="doSignOut()">Sign out</button>
    </div>

  </div>
</div>

<script>
var auth = window.firebaseAuth;

function signInWithGoogle() {
  var btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = 'Signing in…';
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'myhq.in' });
  auth.signInWithPopup(provider).catch(function(err) {
    btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'Sign in with Google  →';
    if (err.code !== 'auth/popup-closed-by-user') {
      showAuthError('Sign-in failed. Please try again.');
    }
  });
}

function showAuthError(msg) {
  var el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('visible');
}

function doSignOut() {
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  var signinPanel  = document.getElementById('signin-panel');
  var successPanel = document.getElementById('success-panel');
  var authError    = document.getElementById('auth-error');
  var btn          = document.getElementById('google-btn');

  if (user) {
    if (!user.email.endsWith('@myhq.in')) {
      auth.signOut();
      showAuthError('Only myHQ team members can access this.');
      signinPanel.style.display  = '';
      successPanel.classList.remove('visible');
      btn.disabled = false;
      btn.querySelector('.btn-text').textContent = 'Sign in with Google  →';
      return;
    }
    authError.classList.remove('visible');
    document.getElementById('success-name').textContent = (user.displayName || user.email).split(' ')[0];
    signinPanel.style.display = 'none';
    successPanel.classList.add('visible');
  } else {
    signinPanel.style.display = '';
    successPanel.classList.remove('visible');
    btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'Sign in with Google  →';
  }
});
</script>
</body>
</html>
